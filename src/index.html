<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Feed</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyFeed" />
  <meta name="theme-color" content="#090909" />
  <link rel="apple-touch-icon" href="/icon.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Intro Splash ─────────────────────────────────────────────────────── -->
  <div id="intro-splash" aria-hidden="true">
    <div class="splash-logo">
      <div class="splash-logo-ring"></div>
      <div class="splash-icon splash-icon--img">
        <img src="icon.jpg" alt="My Feed" />
      </div>
    </div>
    <p class="splash-wordmark">My <span>Feed</span></p>
    <p class="splash-tagline" id="splash-tagline"></p>
    <div class="splash-loader">
      <div class="splash-loader-dot"></div>
      <div class="splash-loader-dot"></div>
      <div class="splash-loader-dot"></div>
    </div>
  </div>

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-logo">
      <div class="header-logo-icon header-logo-icon--img">
        <img src="icon.jpg" alt="" />
      </div>
      <span id="header-title">My Feed</span>
    </div>

  </header>

  <!-- ── Pull-to-refresh indicator ──────────────────────────────────────────── -->
  <div id="ptr-indicator" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
  </div>

  <!-- ── Feed tab content ─────────────────────────────────────────────────── -->
  <div id="section-feed">
    <div id="filter-bar" hidden>
      <div id="filter-pills"></div>
    </div>
    <div id="watch-tally" hidden></div>
    <p id="status" hidden></p>
    <div id="skeleton-loader" class="skeleton-grid" style="display:none">
      <!-- Skeletons injected by JS -->
    </div>
    <main id="feed"></main>
  </div>

  <!-- ── Finance tab content ──────────────────────────────────────────────── -->
  <div id="section-finance" hidden>
    <div class="fin-header">
      <h2 class="fin-title">Finance</h2>
      <button class="fin-refresh-btn" id="fin-refresh-btn" onclick="finRefresh()" aria-label="Refresh prices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>

    <!-- Add ticker row -->
    <div class="fin-add-row">
      <input
        type="text"
        id="fin-ticker-input"
        class="fin-ticker-input"
        placeholder="Add ticker… e.g. AAPL, BTC-USD"
        autocapitalize="characters"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') finAddTicker()"
      />
      <button class="fin-add-btn" onclick="finAddTicker()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Status / error message -->
    <p id="fin-status" class="fin-status" hidden></p>

    <!-- Ticker cards -->
    <div id="fin-grid"></div>

    <!-- Empty state -->
    <div id="fin-empty" class="fin-empty" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      <p>No tickers yet.</p>
      <p class="fin-empty-hint">Add a symbol like AAPL, TSLA, BTC-USD, ETH-USD…</p>
    </div>
  </div>

  <!-- ── Audiobooks tab content ────────────────────────────────────────────── -->
  <div id="section-audiobooks" hidden>

    <!-- Library view -->
    <div id="ab-library-view">
      <div class="ab-library-toolbar">
        <div class="ab-filter-row">
          <button class="ab-filter-pill active" data-filter="all"        onclick="abSetLibraryFilter('all')">All</button>
          <button class="ab-filter-pill"        data-filter="inprogress" onclick="abSetLibraryFilter('inprogress')">In Progress</button>
          <button class="ab-filter-pill"        data-filter="unstarted"  onclick="abSetLibraryFilter('unstarted')">Unstarted</button>
          <button class="ab-filter-pill"        data-filter="finished"   onclick="abSetLibraryFilter('finished')">Finished</button>
          <select id="ab-sort-select" class="ab-sort-select" onchange="abSetLibrarySort(this.value)">
            <option value="lastPlayed">Recent</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
          </select>
        </div>
      </div>
      <div id="ab-library"></div>
    </div>

    <!-- Player view -->
    <div id="ab-player-view" hidden>
      <div class="ab-player-header">
        <button class="ab-back-btn" onclick="closePlayer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Library
        </button>
      </div>

      <div class="ab-player-body">
        <div class="ab-cover-art" id="ab-cover-art">🎧</div>

        <div class="ab-player-info">
          <p id="ab-player-title"  class="ab-player-title"></p>
          <p id="ab-player-author" class="ab-player-author"></p>
        </div>

        <!-- Chapter selector (multi-file books only) -->
        <select id="ab-chapter-select" class="ab-chapter-select" onchange="abSelectChapter()" hidden></select>

        <!-- Scrub bar -->
        <div class="ab-scrub-row">
          <span id="ab-current-time" class="ab-time">0:00</span>
          <input id="ab-scrub" class="ab-scrub" type="range" min="0" max="100" step="0.1" value="0" />
          <span id="ab-duration" class="ab-time">0:00</span>
        </div>

        <!-- Main controls: bookmark | back 30 | play/pause | fwd 30 -->
        <div class="ab-controls">
          <button id="ab-bookmark-btn" class="ab-ctrl-btn ab-ctrl-sm" onclick="abAddBookmark()" title="Bookmark" aria-label="Add bookmark">🔖</button>
          <button class="ab-ctrl-btn" onclick="abSkip(-30)" title="Back 30s" aria-label="Back 30 seconds">−30</button>
          <button id="ab-play-btn" class="ab-ctrl-btn ab-play" onclick="abTogglePlay()" aria-label="Play/Pause">▶</button>
          <button class="ab-ctrl-btn" onclick="abSkip(30)" title="Forward 30s" aria-label="Forward 30 seconds">+30</button>
        </div>

        <!-- Speed selector -->
        <div class="ab-speed-row">
          <button class="ab-speed-btn"        data-speed="0.75" onclick="abSetSpeed(0.75)">0.75×</button>
          <button class="ab-speed-btn active" data-speed="1"    onclick="abSetSpeed(1)">1×</button>
          <button class="ab-speed-btn"        data-speed="1.25" onclick="abSetSpeed(1.25)">1.25×</button>
          <button class="ab-speed-btn"        data-speed="1.5"  onclick="abSetSpeed(1.5)">1.5×</button>
          <button class="ab-speed-btn"        data-speed="2"    onclick="abSetSpeed(2)">2×</button>
        </div>

        <!-- Bookmarks section -->
        <div class="ab-bookmarks-section">
          <button class="ab-bookmarks-toggle" onclick="abToggleBookmarks()">
            🔖 Bookmarks <span id="ab-bookmark-count"></span>
            <span class="ab-toggle-arrow">›</span>
          </button>
          <div id="ab-bookmarks-list" hidden></div>
        </div>

        <!-- Mark as Finished -->
        <button id="ab-finish-btn" class="ab-finish-btn" onclick="abMarkFinished()">Mark as Finished</button>

      </div>
    </div>
  </div>

  <!-- Hidden audio element -->
  <audio id="ab-audio" preload="metadata"></audio>

  <!-- ── Reason modal ──────────────────────────────────────────────────────── -->
  <div id="modal-backdrop" onclick="closeModal()"></div>
  <div id="reason-modal" role="dialog" aria-modal="true" aria-label="Why are you watching this?">
    <p class="modal-question">Why are you watching this?</p>
    <div class="modal-options">
      <button onclick="selectReason('Learning')">
        <span>📚</span>
        <span>Learning</span>
      </button>
      <button onclick="selectReason('Entertainment')">
        <span>😂</span>
        <span>Entertainment</span>
      </button>
      <button onclick="selectReason('Background')">
        <span>🎵</span>
        <span>Background</span>
      </button>
      <button onclick="selectReason('Habit')">
        <span>😔</span>
        <span>Habit</span>
      </button>
    </div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>

  <!-- ── Bottom tab bar ────────────────────────────────────────────────────── -->
  <nav id="tab-bar">
    <button class="tab-btn" data-tab="finance" onclick="switchTab('finance')">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </span>
      <span class="tab-label">Finance</span>
    </button>
    <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">
      <span class="tab-icon">▶</span>
      <span class="tab-label">Feed</span>
    </button>
    <button class="tab-btn" data-tab="audiobooks" onclick="switchTab('audiobooks')">
      <span class="tab-icon">🎧</span>
      <span class="tab-label">Books</span>
    </button>
  </nav>

  <script src="helpers.js"></script>
  <script src="finance.js"></script>
  <script src="channels.js"></script>
  <script src="audiobooks.js"></script>
  <script src="app.js"></script>
  <script src="audiobook.js"></script>
</body>
</html>
