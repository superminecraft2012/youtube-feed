[build]
  publish = "src"
  functions = "netlify/functions"
  command = "sed -i 's/YOUR_ULTRA_PASS/$ULTRA_PASS/g' src/sw.js"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
